server {
    listen 80;
    listen 443 ssl;
    server_name teste.riveslaser.com.br;

    # Frontend React (porta 3002)
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL
    ssl_certificate /www/sites/sistema.riveslaser.com.br/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/sistema.riveslaser.com.br/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
}
