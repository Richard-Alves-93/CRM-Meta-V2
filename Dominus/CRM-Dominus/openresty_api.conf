server {
    listen 80;
    listen 443 ssl;
    server_name api.riveslaser.com.br www.api.riveslaser.com.br;

    # ===================================
    # BACKEND API (Node.js - porta 8099 - NOVO TESTE)
    # ===================================
    location / {
        proxy_pass http://127.0.0.1:8099;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;

        # REMOVIDO: add_header de CORS (deixando para o Express gerenciar)
        
        if ($request_method = 'OPTIONS') {
            # Para preflight requests, o OpenResty ainda pode responder rápido
            add_header 'Access-Control-Allow-Origin' 'https://sistema.riveslaser.com.br' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, Content-Type, Authorization, X-Requested-With, Accept' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # SSL
    ssl_certificate /www/sites/api.riveslaser.com.br/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/api.riveslaser.com.br/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    error_page 497 https://$host$request_uri;
    add_header Strict-Transport-Security "max-age=31536000";
}
